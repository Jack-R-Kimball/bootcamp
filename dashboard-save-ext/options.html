<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      background: #161b22;
      color: #e6edf3;
      padding: 1rem 1.125rem 0.875rem;
      width: 320px;
    }
    label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7d8590;
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 0.8125rem;
      padding: 0.35rem 0.5rem;
      margin-bottom: 0.625rem;
    }
    input:focus { outline: none; border-color: #58a6ff; }
    .row { display: flex; align-items: center; gap: 0.625rem; }
    button {
      font-family: inherit;
      font-size: 0.6875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #f78166;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    #status { font-size: 0.6875rem; color: #3fb950; }
  </style>
</head>
<body>
  <label for="url-input">Dashboard URL</label>
  <input id="url-input" type="url" placeholder="http://100.107.254.10:4321" spellcheck="false">
  <div class="row">
    <button id="save-btn">Save</button>
    <span id="status"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
